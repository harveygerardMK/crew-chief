name: Deploy agent to droplet (manual only)

on:
  workflow_dispatch:
    inputs:
      confirm_restart:
        description: "Type RESTART to deploy code and restart the live Crew Chief API."
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Race is over; live API restarts must be intentional because they can resume token spend.
    if: github.repository == 'harveygerardMK/crew-chief' && github.event.inputs.confirm_restart == 'RESTART'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy code on droplet via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /var/crew-chief
            bash scripts/droplet-update-code.sh
