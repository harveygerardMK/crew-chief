name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Worker saves can push twice in quick succession; do not cancel the newer build.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Build site
        env:
          PUBLIC_BROADCAST_API_URL: ${{ vars.PUBLIC_BROADCAST_API_URL }}
          PUBLIC_AGENT_API_URL: ""
        run: npm run build
      - name: Verify agent UI is offline in dist
        run: |
          test -f dist/index.html
          test -f dist/agent/index.html
          test -f dist/app.js
          grep -q 'CREW_CHIEF_API' dist/config.js
          grep -q 'CREW_CHIEF_API = ""' dist/config.js || {
            echo "Crew Chief should deploy with an empty API URL after race shutdown"
            exit 1
          }
          echo "Agent UI present at / and /agent/ in offline mode"

      - name: Verify race data published for agent
        run: |
          test -f dist/data/aid-stations.json
          curl -sf "file://$PWD/dist/data/aid-stations.json" | python3 -c "import json,sys; d=json.load(sys.stdin); assert len(d)>=10"
          test -f dist/data/race-broadcast.json
          curl -sf "file://$PWD/dist/data/race-broadcast.json" | python3 -c "import json,sys; d=json.load(sys.stdin); assert 'updates' in d"
          echo "aid-stations.json and race-broadcast.json published at /data/ for agent API fetch"

      - name: Verify crew-site points to Ask Harvey for updates
        run: |
          grep -q "Crew updates in Ask Harvey" dist/crew-site/index.html
          echo "crew-site directs family to Ask Harvey chat for Amanda posts"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
