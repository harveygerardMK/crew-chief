name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Worker saves can push twice in quick succession; do not cancel the newer build.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Build site
        env:
          PUBLIC_BROADCAST_API_URL: ${{ vars.PUBLIC_BROADCAST_API_URL }}
          PUBLIC_AGENT_API_URL: ${{ vars.PUBLIC_AGENT_API_URL }}
        run: npm run build
      - name: Verify agent UI in dist
        run: |
          test -f dist/index.html
          test -f dist/agent/index.html
          test -f dist/app.js
          grep -q 'CREW_CHIEF_API' dist/config.js
          grep -qE 'CREW_CHIEF_API = "https://' dist/config.js || {
            echo "PUBLIC_AGENT_API_URL missing or empty — set repo variable before deploy"
            exit 1
          }
          echo "Agent UI present at / and /agent/"

      - name: Smoke test live agent API
        if: vars.PUBLIC_AGENT_API_URL != ''
        continue-on-error: true
        env:
          # Static site deploy must not block on droplet chat/API blips — update droplet separately.
          VERIFY_AGENT_STRICT: "0"
        run: |
          chmod +x scripts/verify-agent.sh
          ./scripts/verify-agent.sh "${{ vars.PUBLIC_AGENT_API_URL }}" || {
            echo "::warning::Live agent smoke test failed — Pages deploy will continue. Fix droplet/API and re-run verify-agent.sh locally."
            exit 0
          }
      - name: Verify live updates rendered
        run: |
          JSON_COUNT=$(node -e "const d=require('./data/race-broadcast.json'); console.log(Array.isArray(d.updates)?d.updates.length:0)")
          HTML_COUNT=$(grep -o 'class="live-update-item"' dist/crew-site/index.html | wc -l | tr -d ' ')
          if [ "$JSON_COUNT" != "$HTML_COUNT" ]; then
            echo "Live update count mismatch: race-broadcast.json has $JSON_COUNT, crew-site/index.html has $HTML_COUNT"
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
