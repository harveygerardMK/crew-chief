name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Worker saves can push twice in quick succession; do not cancel the newer build.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Build site
        env:
          PUBLIC_BROADCAST_API_URL: ${{ vars.PUBLIC_BROADCAST_API_URL }}
          PUBLIC_AGENT_API_URL: ${{ vars.PUBLIC_AGENT_API_URL }}
        run: npm run build
      - name: Verify agent UI in dist
        run: |
          test -f dist/agent/index.html
          test -f dist/agent/app.js
          grep -q 'CREW_CHIEF_API' dist/agent/config.js
          echo "Agent UI present at /crew-chief/agent/"
      - name: Verify live updates rendered
        run: |
          JSON_COUNT=$(node -e "const d=require('./data/race-broadcast.json'); console.log(Array.isArray(d.updates)?d.updates.length:0)")
          HTML_COUNT=$(grep -o 'class="live-update-item"' dist/index.html | wc -l | tr -d ' ')
          if [ "$JSON_COUNT" != "$HTML_COUNT" ]; then
            echo "Live update count mismatch: race-broadcast.json has $JSON_COUNT, index.html has $HTML_COUNT"
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
